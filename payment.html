<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата — AI Режисер</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(180deg, #ffffff 0%, #ffaee0 30%, #8820b0 70%, #120330 100%);
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .logo {
            font-size: 22px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 32px;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .card h1 {
            font-size: 24px;
            font-weight: 700;
            color: #8820b0;
            margin-bottom: 8px;
            text-align: center;
        }
        .card .price {
            text-align: center;
            font-size: 48px;
            font-weight: 800;
            color: #1A1A1A;
            margin-bottom: 32px;
        }
        .card .price span {
            font-size: 24px;
            font-weight: 600;
            color: #fce238;
        }
    </style>
</head>
<body>
    <div class="logo">Ellen Keyo School</div>
    <div class="card">
        <h1>AI Режисер</h1>
        <div class="price"><span>$</span>399</div>
        <script src="https://static.sendpulse.com/web-push/loader.js"></script>
        <div class="sp-widget" data-id="widget-0d94b5c6-8c3c-4c80-8239-df4153a5e4e3"></div>
    </div>
</body>
</html>
